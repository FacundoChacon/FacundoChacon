name: Actualizar tarjetas de estadisticas del README

on:
  schedule:
    # Corre todos los dias a las 03:00 UTC (00:00 hora Argentina aprox.)
    - cron: "0 3 * * *"
  # Permite tambien correrlo manualmente desde la pestaña "Actions" de GitHub,
  # sin tener que esperar al horario programado.
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  generar-tarjetas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generar tarjeta de estadisticas generales
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=default&count_private=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar tarjeta de lenguajes mas usados
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&hide_border=true&theme=default"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitear las tarjetas generadas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: actualizar tarjetas de estadisticas del README"
          git push